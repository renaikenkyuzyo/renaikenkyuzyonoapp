<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>恋愛研究所アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- アプリアイコン -->
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f1225;
  color: #fff;
}

/* 上部バー */
#appBar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  background: #1c1f4a;
}

#appBar button {
  background: #3a3fff;
  border: none;
  color: #fff;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 14px;
}

/* iframe */
iframe {
  width: 100%;
  height: calc(100vh - 56px);
  border: none;
  background: #fff;
}
</style>
</head>

<body>

<!-- 操作バー -->
<div id="appBar">
  <button onclick="goBack()">← 戻る</button>
  <button onclick="reloadPage()">↻ 再読み込み</button>
</div>

<!-- 中身 -->
<iframe id="appFrame"
  src="https://sites.google.com/jhs.u-ryukyu.ac.jp/lovestory-app/ホーム">
</iframe>

<script>
function goBack() {
  const frame = document.getElementById("appFrame");
  frame.contentWindow.history.back();
}

function reloadPage() {
  const frame = document.getElementById("appFrame");
  frame.contentWindow.location.reload();
}
</script>

</body>
</html>
