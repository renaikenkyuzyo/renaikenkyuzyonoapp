<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>恋愛研究所</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- アプリアイコン・PWA設定（STEP3 完了） -->
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6ca3">

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* ハートアニメーション */
#heartAnimation {
  position: absolute;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#heartAnimation svg {
  width: 200px;
  height: 200px;
}

#heartAnimation path {
  fill: none;
  stroke: #ff6ca3;
  stroke-width: 4;
  stroke-linecap: round;
  stroke-dasharray: 300;
  stroke-dashoffset: 300;
  animation: draw 5s ease-in-out forwards;
}

@keyframes draw {
  0%, 40% { stroke-dashoffset: 300; }
  55% { stroke-dashoffset: 0; }
  100% { stroke-dashoffset: 0; }
}

/* ロゴ文字 */
#logoText {
  position: absolute;
  font-size: 52px;
  font-weight: 700;
  opacity: 0;
  text-align: center;
  background: linear-gradient(45deg, #ff6ca3, #6cd3ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  transform: scale(0.4);
  transition: transform 2.5s ease, opacity 1.5s ease;
  z-index: 20;
}

/* アプリ案内 */
#installGuide {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #1f1f3a, #3a3a7a);
  color: #fff;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 24px;
  z-index: 30;
}

#installGuide h2 {
  font-size: 22px;
  margin-bottom: 12px;
}

#installGuide p {
  font-size: 15px;
  line-height: 1.7;
}

.note {
  font-size: 12px;
  opacity: 0.8;
  margin-top: 16px;
}
</style>
</head>

<body>

<!-- ハート -->
<div id="heartAnimation">
  <svg viewBox="0 0 100 100">
    <path d="
      M50 70
      C35 55, 20 40, 25 25
      C30 10, 50 15, 50 30
      C50 15, 70 10, 75 25
      C80 40, 65 55, 50 70
    " />
  </svg>
</div>

<!-- ロゴ -->
<div id="logoText">恋愛研究所</div>

<!-- インストール案内 -->
<div id="installGuide">
  <h2>📱 恋愛研究所公式アプリ</h2>
  <p id="guideText"></p>
  <div class="note">※ アプリを入れるとサイトが開けます。LOS3.01</div>
</div>

<script>
const heart = document.getElementById("heartAnimation");
const logo = document.getElementById("logoText");
const guide = document.getElementById("installGuide");
const text = document.getElementById("guideText");

const ua = navigator.userAgent.toLowerCase();
const isIphone = ua.includes("iphone");
const isAndroid = ua.includes("android");

function isAppMode() {
  return window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
}

/* ハート終了 → ロゴ表示 */
setTimeout(() => {
  heart.style.transition = "opacity 0.6s ease";
  heart.style.opacity = 0;

  logo.style.opacity = 1;
  logo.style.transform = "scale(1)";

  /* ロゴ拡大 → フェードアウト → 遷移 */
  setTimeout(() => {
    logo.style.transition = "transform 1.5s ease, opacity 1.5s ease";
    logo.style.transform = "scale(1.35)";
    logo.style.opacity = 0;

    setTimeout(() => {
      if (isAppMode()) {
        location.href = "https://sites.google.com/jhs.u-ryukyu.ac.jp/lovestory-app/ホーム";
      } else {
        guide.style.display = "flex";

        if (isIphone) {
          text.innerHTML = `
            右下の <strong>•••ボタンをクリック。（もっと見るを押してから）共有ボタン（□↑）</strong> から<br>
            <strong>「ホーム画面に追加」</strong>してください
          `;
        } else if (isAndroid) {
          text.innerHTML = `
            右上の <strong>︙ メニュー</strong> から<br>
            <strong>「アプリをインストール」</strong><br>
            または <strong>「ホーム画面に追加」</strong>
          `;
        } else {
          text.innerHTML = `
            スマートフォンでアクセスしてください。現在、スマートフォンにしか対応していません。
          `;
        }
      }
    }, 1500);

  }, 1800);

}, 5000);
</script>

</body>
</html>
