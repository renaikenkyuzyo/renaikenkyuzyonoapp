<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>恋愛研究所アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* ハートアニメ */
#heartAnimation {
  position: absolute;
  display: flex;
  justify-content: center;
  align-items: center;
}

#heartAnimation svg {
  width: 150px;
  height: 150px;
}

#heartAnimation path {
  fill: none;
  stroke: #ff6ca3;
  stroke-width: 4;
  stroke-linecap: round;
  stroke-dasharray: 300;
  stroke-dashoffset: 300;
  animation: draw 4s ease-in-out 1 forwards; /* 1回再生 */
}

@keyframes draw {
  0%, 40%, 100% { stroke-dashoffset: 300; }
  50% { stroke-dashoffset: 0; }
}

/* 恋愛研究所文字 */
#logoText {
  position: absolute;
  font-size: 32px;
  color: #ff6ca3;
  opacity: 0;
  transition: opacity 0.5s ease;
}
</style>
</head>

<body>

<!-- ハートアニメ -->
<div id="heartAnimation">
  <svg viewBox="0 0 100 100">
    <path d="
      M50 70
      C35 55, 20 40, 25 25
      C30 10, 50 15, 50 30
      C50 15, 70 10, 75 25
      C80 40, 65 55, 50 70
    " />
  </svg>
</div>

<!-- 恋愛研究所文字 -->
<div id="logoText">恋愛研究所</div>

<script>
const heart = document.getElementById("heartAnimation");
const logo = document.getElementById("logoText");

// アニメ完了後の処理
// ハートアニメは4秒で1回再生
setTimeout(() => {
  // ハートを非表示
  heart.style.display = "none";

  // ロゴ文字を表示
  logo.style.opacity = 1;

  // 文字を2秒表示してからGoogleサイトへ移動
  setTimeout(() => {
    window.location.href = "https://sites.google.com/jhs.u-ryukyu.ac.jp/lovestory-app";
  }, 2000);

}, 4000);
</script>

</body>
</html>
