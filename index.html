<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>恋愛研究所アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- アイコン -->
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* ハートアニメーション */
#heartAnimation {
  position: absolute;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#heartAnimation svg {
  width: 200px;
  height: 200px;
}

#heartAnimation path {
  fill: none;
  stroke: #ff6ca3;
  stroke-width: 4;
  stroke-linecap: round;
  stroke-dasharray: 300;
  stroke-dashoffset: 300;
  animation: draw 4s ease-in-out 1 forwards;
}

@keyframes draw {
  0%, 40%, 100% { stroke-dashoffset: 300; }
  50% { stroke-dashoffset: 0; }
}

/* 恋愛研究所文字 */
#logoText {
  position: absolute;
  font-size: 50px;
  font-weight: bold;
  opacity: 0;
  text-align: center;
  background: linear-gradient(45deg, #ff6ca3, #6cd3ff); /* ピンク→水色 */
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  transform: scale(0.5);
  transition: all3.5s ease;
  z-index: 20;
}

/* アプリ案内画面 */
#installGuide {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #1f1f3a, #3a3a7a);
  color: #fff;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 24px;
  z-index: 30;
}

#installGuide h2 {
  font-size: 22px;
  margin-bottom: 12px;
}

#installGuide p {
  font-size: 15px;
  line-height: 1.7;
  opacity: 0.95;
}

.note {
  font-size: 12px;
  opacity: 0.8;
  margin-top: 16px;
}
</style>
</head>

<body>

<!-- ハートアニメ -->
<div id="heartAnimation">
  <svg viewBox="0 0 100 100">
    <path d="
      M50 70
      C35 55, 20 40, 25 25
      C30 10, 50 15, 50 30
      C50 15, 70 10, 75 25
      C80 40, 65 55, 50 70
    " />
  </svg>
</div>

<!-- 恋愛研究所文字 -->
<div id="logoText">恋愛研究所</div>

<!-- ブラウザ用：アプリ案内 -->
<div id="installGuide">
  <h2>📱 恋愛研究所公式アプリ</h2>
  <p id="guideText"></p>
  <div class="note">
    ※ アプリを入れるとサイトが開けます。
  </div>
</div>

<script>
// 要素取得
const heart = document.getElementById("heartAnimation");
const logo = document.getElementById("logoText");
const guide = document.getElementById("installGuide");
const text = document.getElementById("guideText");

// ユーザーエージェント判定
const ua = navigator.userAgent.toLowerCase();
const isIphone = ua.includes("iphone");
const isAndroid = ua.includes("android");

// アプリモード判定
function isAppMode() {
  return window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
}

// ハートアニメ終了後（4秒後）に文字表示
setTimeout(() => {
  // ハートをフェードアウト
  heart.style.transition = "opacity 0.5s ease";
  heart.style.opacity = 0;

  // 文字表示＋大きく
  logo.style.opacity = 1;
  logo.style.transform = "scale(1)";

  // 文字表示後さらに1.5秒後にブラウザ判定して処理
  setTimeout(() => {
    if (isAppMode()) {
      // アプリから起動 → 本体サイトへ
      location.href = "https://sites.google.com/jhs.u-ryukyu.ac.jp/lovestory-app/ホーム";
    } else {
      // ブラウザ起動 → インストール案内表示
      guide.style.display = "flex";

      if (isIphone) {
        text.innerHTML = `
           <strong>右下にある•••ボタンをクリック。その後共有ボタン（□↑）</strong> を押して<br>
          <strong>「ホーム画面に追加」</strong>してください（右下に「もっと見る」がある場合はそこを選択してから、ホーム画面に追加を選択してください）
        `;
      } else if (isAndroid) {
        text.innerHTML = `
          右上の <strong>︙ メニュー</strong> から<br>
          <strong>「アプリをインストール」</strong><br>
          または <strong>「ホーム画面に追加」</strong>
        `;
      } else {
        text.innerHTML = `
          スマートフォンでアクセスしてください。スマートフォン以外ではアプリをダウンロードできません
        `;
      }
    }
  }, 1500);

}, 4000); // ハート4秒後
</script>

</body>
</html>
