<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>恋愛研究所</title>

<!-- PWA / アイコン -->
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#ffffff">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --pink:#ff7eb3;
  --blue:#7afcff;
  --glass:rgba(255,255,255,0.7);
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Nunito',system-ui,-apple-system;
  background:linear-gradient(180deg,#f2fbff,#ffffff);
  color:#333;
}

/* ===== インストール誘導 ===== */
#installGuide{
  display:none;
  min-height:100vh;
  padding:40px 20px;
  text-align:center;
}
.install-box{
  max-width:360px;
  margin:auto;
  background:var(--glass);
  backdrop-filter:blur(20px);
  border-radius:28px;
  padding:28px;
}
.install-title{
  font-size:32px;
  font-weight:700;
  background:linear-gradient(90deg,var(--pink),var(--blue));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ===== アプリ本体 ===== */
#realApp{display:none;}
.app{min-height:100vh;padding-bottom:90px}

/* スプラッシュ */
#splash{
  position:fixed; inset:0;
  background:#fff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:100;
}
.heart{
  width:80px;height:80px;
  background:linear-gradient(135deg,var(--pink),var(--blue));
  transform:rotate(45deg);
  animation:beat 1.2s infinite;
  border-radius:14px;
  position:relative;
}
.heart::before,.heart::after{
  content:"";
  width:80px;height:80px;
  background:inherit;
  border-radius:50%;
  position:absolute;
}
.heart::before{left:-40px;}
.heart::after{top:-40px;}
@keyframes beat{
  0%,100%{transform:scale(1) rotate(45deg);}
  50%{transform:scale(1.15) rotate(45deg);}
}
.logo{
  margin-top:24px;
  font-size:32px;
  font-weight:700;
  background:linear-gradient(90deg,var(--pink),var(--blue));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* セクション */
section{display:none;padding:20px;}
section.active{display:block;}
.card{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border-radius:22px;
  padding:18px;
  margin-bottom:16px;
}

/* 入力 */
input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:16px;
  margin-bottom:12px;
}

/* ボタン */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,var(--pink),var(--blue));
  color:#fff;
  font-weight:700;
}

/* iframe */
iframe{
  width:100%;
  height:65vh;
  border:none;
  border-radius:18px;
}

/* ===== タブバー（アイコン＋文字） ===== */
.tabbar{
  position:fixed;
  bottom:0;left:0;right:0;
  height:82px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(24px);
  display:flex;
  border-top:1px solid rgba(0,0,0,0.05);
}
.tab{
  flex:1;
  text-align:center;
  padding-top:8px;
  font-size:11px;
  color:#888;
}
.tab span{
  display:block;
  font-size:22px;
}
.tab.active{
  color:#ff7eb3;
  font-weight:700;
}
</style>
</head>

<body>

<!-- ===== インストール案内 ===== -->
<div id="installGuide">
  <div class="install-box">
    <div class="install-title">恋愛研究所</div>
    <p id="installText"></p>
  </div>
</div>

<!-- ===== アプリ ===== -->
<div id="realApp">

  <div id="splash">
    <div class="heart"></div>
    <div class="logo">恋愛研究所</div>
  </div>

  <div class="app">

    <!-- ホーム -->
    <section id="home" class="active">
      <div class="card">
        ようこそ、恋愛研究所へ 💖
      </div>
      <div class="card">
        <details>
          <summary>利用規約</summary>
          本アプリは恋愛に関する一般的な情報を提供します。
        </details>
      </div>
    </section>

    <!-- ログイン -->
    <section id="login">
      <div class="card">
        <input type="password" id="pw" placeholder="パスワード">
        <button onclick="login()">ログイン</button>
      </div>
    </section>

    <!-- 恋愛 -->
    <section id="love">
      <div class="card">
        ・自分の気持ちを大切に<br>
        ・安心できる関係を選ぶ<br>
        ・無理しない恋愛を
      </div>
    </section>

    <!-- 本棚 -->
    <section id="books">
      <div class="card">
        <iframe src="https://read.bookcreator.com/library/-OlyvZf_fsBQQDH7NNgD"></iframe>
      </div>
    </section>

    <!-- 設定 -->
    <section id="settings">
      <div class="card">
        通知状態：<span id="notifyState"></span>
      </div>
      <div class="card">
        恋愛研究所 v1.0
      </div>
    </section>

  </div>

  <!-- タブ -->
  <div class="tabbar">
    <div class="tab active" onclick="tab('home',this)"><span>🏠</span>ホーム</div>
    <div class="tab" onclick="tab('login',this)"><span>🔐</span>ログイン</div>
    <div class="tab" onclick="tab('love',this)"><span>💖</span>恋愛</div>
    <div class="tab" onclick="tab('books',this)"><span>📚</span>本棚</div>
    <div class="tab" onclick="tab('settings',this)"><span>⚙️</span>設定</div>
  </div>

</div>

<script>
const isiOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const isAndroid=/android/i.test(navigator.userAgent);
const isApp=window.matchMedia('(display-mode: standalone)').matches||navigator.standalone;

document.addEventListener("DOMContentLoaded",()=>{
  if(isApp){
    realApp.style.display="block";
    setTimeout(()=>splash.style.display="none",2000);
    notifyState.textContent = Notification.permission || "未設定";
  }else{
    installGuide.style.display="block";
    installText.innerHTML = isiOS
      ? "Safariの共有ボタンから<br><b>ホーム画面に追加</b>してください"
      : "Chromeのメニューから<br><b>ホーム画面に追加</b>してください";
  }
});

function tab(id,el){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}

function login(){
  if(pw.value==="loveaffair"){
    location.href="https://sites.google.com/jhs.u-ryukyu.ac.jp/lovestory-app/%E4%BC%9A%E5%93%A1%E3%82%B5%E3%82%A4%E3%83%88";
  }else{
    alert("パスワードが違います");
  }
}
</script>

</body>
</html>
