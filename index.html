<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>恋愛研究所アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- アイコン -->
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

/* アプリ案内画面 */
#installGuide {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #1f1f3a, #3a3a7a);
  color: #fff;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 24px;
}

#installGuide h2 {
  font-size: 22px;
  margin-bottom: 12px;
}

#installGuide p {
  font-size: 15px;
  line-height: 1.7;
  opacity: 0.95;
}

.note {
  font-size: 12px;
  opacity: 0.8;
  margin-top: 16px;
}
</style>
</head>

<body>

<!-- ブラウザ用：アプリ案内 -->
<div id="installGuide">
  <h2>📱 恋愛研究所アプリ</h2>
  <p id="guideText"></p>
  <div class="note">
    ※ アプリを入れるとサイトが開けます
  </div>
</div>

<script>
// アプリモード判定
function isAppMode() {
  return window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
}

const guide = document.getElementById("installGuide");
const text = document.getElementById("guideText");
const ua = navigator.userAgent.toLowerCase();
const isIphone = ua.includes("iphone");
const isAndroid = ua.includes("android");

if (isAppMode()) {
  // ✅ アプリから起動 → 本体サイトへ
  location.href = "https://sites.google.com/jhs.u-ryukyu.ac.jp/lovestory-app/ホーム";
} else {
  // ❌ ブラウザ起動 → 案内だけ表示
  guide.style.display = "flex";

  if (isIphone) {
    text.innerHTML = `
      下の <strong>共有ボタン（□↑）</strong> を押して<br>
      <strong>「ホーム画面に追加」</strong>してください
    `;
  } else if (isAndroid) {
    text.innerHTML = `
      右上の <strong>︙ メニュー</strong> から<br>
      <strong>「アプリをインストール」</strong><br>
      または <strong>「ホーム画面に追加」</strong>
    `;
  } else {
    text.innerHTML = `
      スマートフォンでアクセスしてください
    `;
  }
}
</script>

</body>
</html>
